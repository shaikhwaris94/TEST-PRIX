name: 'PRIX'
description: 'AI-based PR Reviewer & Summarizer and Auditor'
branding:
  icon: 'git-merge'
  color: 'orange'
author: 'PRIX'
inputs:
  debug:
    required: false
    description: 'Enable debug mode'
    default: 'false'
  max_files:
    required: false
    description:
      'Max files to summarize and review. Less than or equal to 0 means no
      limit.'
    default: '150'
  review_simple_changes:
    required: false
    description: 'Review even when the changes are simple'
    default: 'false'
  review_comment_lgtm:
    required: false
    description: 'Leave comments even if the patch is LGTM'
    default: 'false'
  path_filters:
    required: false
    description: |
      The path filters, e.g., "src/**.py", "!dist/**", each line will be considered as one pattern.
      See also

      - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onpushpull_requestpull_request_targetpathspaths-ignore
      - https://github.com/isaacs/minimatch
    default: |
      !dist/**
      !**/*.app
      !**/*.bin
      !**/*.bz2
      !**/*.class
      !**/*.db
      !**/*.csv
      !**/*.tsv
      !**/*.dat
      !**/*.dll
      !**/*.dylib
      !**/*.egg
      !**/*.glif
      !**/*.gz
      !**/*.xz
      !**/*.zip
      !**/*.7z
      !**/*.rar
      !**/*.zst
      !**/*.ico
      !**/*.jar
      !**/*.tar
      !**/*.war
      !**/*.lo
      !**/*.log
      !**/*.mp3
      !**/*.wav
      !**/*.wma
      !**/*.mp4
      !**/*.avi
      !**/*.mkv
      !**/*.wmv
      !**/*.m4a
      !**/*.m4v
      !**/*.3gp
      !**/*.3g2
      !**/*.rm
      !**/*.mov
      !**/*.flv
      !**/*.iso
      !**/*.swf
      !**/*.flac
      !**/*.nar
      !**/*.o
      !**/*.ogg
      !**/*.otf
      !**/*.p
      !**/*.pdf
      !**/*.doc
      !**/*.docx
      !**/*.xls
      !**/*.xlsx
      !**/*.ppt
      !**/*.pptx
      !**/*.pkl
      !**/*.pickle
      !**/*.pyc
      !**/*.pyd
      !**/*.pyo
      !**/*.pub
      !**/*.pem
      !**/*.rkt
      !**/*.so
      !**/*.ss
      !**/*.eot
      !**/*.exe
      !**/*.pb.go
      !**/*.lock
      !**/*.ttf
      !**/*.yaml
      !**/*.yml
      !**/*.cfg
      !**/*.toml
      !**/*.ini
      !**/*.mod
      !**/*.sum
      !**/*.work
      !**/*.json
      !**/*.mmd
      !**/*.svg
      !**/*.jpeg
      !**/*.jpg
      !**/*.png
      !**/*.gif
      !**/*.bmp
      !**/*.tiff
      !**/*.webm
      !**/*.woff
      !**/*.woff2
      !**/*.dot
      !**/*.md5sum
      !**/*.wasm
      !**/*.snap
      !**/*.parquet
      !**/gen/**
      !**/_gen/**
      !**/generated/**
      !**/@generated/**
      !**/vendor/**
      !**/*.min.js
      !**/*.min.js.map
      !**/*.min.js.css
      !**/*.tfstate
      !**/*.tfstate.backup
  disable_review:
    required: false
    description: 'Only provide the summary and skip the code review.'
    default: 'false'
  disable_release_notes:
    required: false
    description: 'Disable release notes'
    default: 'false'
  api_base_url:
    required: false
    description: 'The url of the API interface.'
    default: 'https://api.groq.com/openai/v1'
  light_model:
    required: false
    description:
      'Model to use for simple tasks like summarizing diff on a file. (Recommended: gpt-4o-mini, llama-3.1-8b-instant)'
    default: 'llama-3.1-8b-instant'
  heavy_model:
    required: false
    description: 'Model to use for complex tasks such as code reviews. (Recommended: gpt-4o, llama-3.3-70b-versatile)'
    default: 'llama-3.3-70b-versatile'
  model_temperature:
    required: false
    description: 'Temperature for the model'
    default: '0.05'
  retries:
    required: false
    description:
      'How many times to retry API in case of timeouts or errors?'
    default: '5'
  timeout_ms:
    required: false
    description: 'Timeout for API call in millis'
    default: '360000'
  concurrency_limit:
    required: false
    description: 'How many concurrent API calls to make to the AI servers?'
    default: '10'
  github_concurrency_limit:
    required: false
    description: 'How many concurrent API calls to make to GitHub?'
    default: '10'
  system_message:
    required: false
    description: 'System message to be sent to the AI model'
    default: |
      You are `@ai-pr-reviewer` (aka `github-actions[bot]`), a highly 
      sophisticated language model. Your purpose is to act as a 
      highly experienced software engineer and provide a thorough 
      review of the code hunks.
      Your primary goal is to provide deep architectural insights and catch 
      complex bugs that a junior developer would miss. You will act as an 
      Audit Agent, rigorously testing local conditions and boundary values.
      
      Focus areas:
        - Audit & Edge Case Testing: Actively look for null pointers, 
          off-by-one errors, and race conditions.
        - Logic & Correctness
        - Security (SQLi, XSS, Secret Leaks)
        - Performance (O(n^2) loops, redundant DB queries)
        - Tests (Check if logic has corresponding unit tests)
        - Documentation (Ensure docstrings match implementation)
        - Best practices: DRY, SOLID, KISS

      When you find an issue, provide a `suggestion` code block. 
      These suggestions will be automatically verified and collected into 
      a separate Remedy PR for the user to review.
  summarize:
    required: false
    description: 'The prompt for final summarization response'
    default: |
      Provide your final response in markdown with the following content:

      - **Walkthrough**: A high-level summary of the overall change instead of 
        specific files within 80 words.
      - **Changes**: A markdown table of files and their summaries. Group files 
        with similar changes together into a single row to save space.
      - **Poem**: Below the changes, include a whimsical, short poem written by 
        a rabbit to celebrate the changes. Format the poem as a quote using 
        the ">" symbol and feel free to use emojis where relevant.

      Avoid additional commentary as this summary will be added as a comment on the 
      GitHub pull request. Use the titles "Walkthrough" and "Changes" and they must be H2.

  summarize_release_notes:
    required: false
    description:
      'The prompt for generating release notes in the same chat as summarize
      stage'
    default: |
      Craft concise release notes for the pull request. 
      Focus on the purpose and user impact, categorizing changes as "New Feature", "Bug Fix", 
      "Documentation", "Refactor", "Style", "Test", "Chore", or "Revert". Provide a bullet-point list, 
      e.g., "- New Feature: Added search functionality to the UI". Limit your response to 50-100 words 
      and emphasize features visible to the end-user while omitting code-level details.
  language:
    required: false
    description: ISO code for the response language
    default: en-US
  bot_icon:
    required: false
    description: 'The icon for the bot'
    default: '<img src="https://avatars.githubusercontent.com/in/347564?s=41" alt="Image description" width="20" height="20">'
  create_remedy_pr:
    required: false
    description: 'Create a new PR with all verified AI suggestions for human review.'
    default: 'false'
runs:
  using: 'node24'
  main: 'dist/index.js'
